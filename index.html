<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavlodar24 | Доставка</title>
<style>
:root {
  --primary: #00c853;
  --bg: #f0f2f5;
  --card-bg: #fff;
  --text-main: #1e272e;
  --text-gray: #7f8c8d;
  --header-bg: #222;
  --header-text: #fff;
  --car-color: #ffeb3b; /* желтый */
}

[data-theme="dark"] {
  --bg: #111;
  --card-bg: #1e1e1e;
  --text-main: #fff;
  --text-gray: #aaa;
  --header-bg: #111;
  --header-text: #fff;
  --car-color: #ffeb3b; /* желтый */
}

body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text-main);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

/* Кнопка темы */
.theme-toggle {
  position: fixed;
  top:15px;
  right:15px;
  width:45px;
  height:45px;
  border-radius:50%;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:1000;
  font-size:20px;
}

/* Header */
header {
  width:100%; max-width:500px;
  height:200px;
  position: relative;
  background: var(--header-bg);
  border-bottom-left-radius:40px;
  border-bottom-right-radius:40px;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  text-align:center;
  flex-direction:column;
  padding-top:20px;
}

.header-text {
  font-size:28px;
  font-weight:800;
  color: var(--header-text);
  z-index:2;
  position: relative;
  margin-bottom:20px;
}

/* Очертания города */
.city-skyline {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  fill: #444;
  opacity:0.3;
  pointer-events:none;
}

/* Машина */
.car {
  position:absolute;
  bottom:20px;
  left:-150px; 
  width:120px;
  height:50px;
  background: var(--car-color);
  border-radius:15px;
  animation: drive 6s linear infinite;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:5px;
  box-sizing:border-box;
  box-shadow:0 5px 8px rgba(0,0,0,0.3);
}

/* Фары */
.car::before {
  content:'';
  position:absolute;
  top:15px;
  right:-10px;
  width:12px;
  height:12px;
  background: yellow;
  border-radius:50%;
  box-shadow: -35px 0 yellow;
}

/* Колёса */
.car .wheel {
  width:20px;
  height:20px;
  background:black;
  border-radius:50%;
  animation: spin 0.5s linear infinite;
}

/* Движение слева направо */
@keyframes drive {
  0% { left:-150px; }
  100% { left:100%; }
}

/* Вращение колёс */
@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

/* Контент */
.main-container { width:100%; max-width:500px; padding:20px; margin-top:-35px; }

.box {
  background: var(--card-bg);
  padding:30px 25px;
  border-radius:25px;
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
  margin-bottom: 20px;
  text-align:center;
}

.box h2 { margin:0 0 10px; font-size:22px; font-weight:800; }
.box p { margin:0 0 20px; color:var(--text-gray); }

/* Кнопки */
button {
  width:100%; padding:16px; font-size:16px; font-weight:600;
  margin-bottom:12px; border:none; border-radius:22px;
  display:flex; align-items:center; justify-content:center; gap:10px;
  cursor:pointer;
}
button:active { transform:scale(0.96); }
.whatsapp { background: var(--primary); color:white; }
.catalog { background: var(--text-main); color: var(--card-bg); }
.rules { background: transparent; border:2px solid var(--text-main); color: var(--text-main); opacity:0.8; }

/* Соцсети */
.social-box {
  background: var(--card-bg); padding:25px; border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1); text-align:center;
}
.icon-wrapper { display:flex; justify-content:center; gap:25px; margin-top:15px; }
.icon-wrapper img { width:48px; }

footer { padding:30px; text-align:center; font-size:13px; color:var(--text-gray); }
</style>
</head>
<body>

<div class="theme-toggle" onclick="toggleTheme()">
  <span id="theme-icon">🌙</span>
</div>

<header>
  <!-- Очертания города -->
  <svg class="city-skyline" viewBox="0 0 500 200" preserveAspectRatio="xMidYMax meet">
    <polygon points="0,150 20,120 40,150 60,100 80,150 100,130 120,150 140,90 160,150 180,110 200,150 220,100 240,150 260,120 280,150 300,90 320,150 340,110 360,150 380,120 400,150 420,100 440,150 460,130 480,150 500,100 500,200 0,200"/>
  </svg>

  <span class="header-text">Доставка 24/7 Павлодар</span>

  <!-- Автомобиль -->
  <div class="car">
    <div class="wheel"></div>
    <div class="wheel"></div>
  </div>
</header>

<div class="main-container">
  <div class="box">
    <h2>Заказывай доставку за 2 минуты</h2>
    <p>Продукты • Еда • Напитки • Аптека</p>
    <button class="whatsapp" onclick="window.open('https://wa.me/77716093547','_blank')">Написать в WhatsApp</button>
    <button class="catalog" onclick="location.href='catalog/index.html'">Открыть каталог</button>
    <button class="rules" onclick="location.href='rules/index.html'">Правила сервиса</button>
  </div>

  <div class="social-box">
    <h3>Мы онлайн 24/7</h3>
    <div class="icon-wrapper">
      <a href="https://instagram.com/dostavka.pavlodar" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
      </a>
      <a href="https://wa.me/77716093547" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
      </a>
    </div>
  </div>
</div>

<footer>© 2026 DOSTAVKA PAVLODAR24 🚀</footer>

<script>
function toggleTheme(){
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  if(html.getAttribute('data-theme')==='dark'){
    html.removeAttribute('data-theme');
    icon.textContent='🌙';
  } else {
    html.setAttribute('data-theme','dark');
    icon.textContent='☀️';
  }
}
</script>
</body>
</html>
