<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pavlodar24 | Доставка</title>
<style>
:root {
  --primary: #00c853;
  --bg: #f0f2f5;
  --card-bg: #fff;
  --text-main: #1e272e;
  --text-gray: #7f8c8d;
  --header-bg: #ffffffcc;
  --header-text: #1e272e;
  --shadow: rgba(0,0,0,0.1);
}

[data-theme="dark"] {
  --bg: #111;
  --card-bg: #1e1e1e;
  --text-main: #fff;
  --text-gray: #aaa;
  --header-bg: #222222cc;
  --header-text: #fff;
  --shadow: rgba(0,0,0,0.4);
}

body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text-main);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  transition: background 0.3s, color 0.3s;
}

/* Кнопка темы iOS Style */
.theme-toggle {
  position: fixed;
  top: 15px;
  right: 15px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(128, 128, 128, 0.2);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 1000;
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.theme-toggle:active { transform: scale(0.85); }

/* Стили иконок внутри кнопки */
.theme-toggle svg {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: var(--text-main);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: 0.3s;
}

/* Header */
header {
  width:100%;
  max-width:500px;
  height:120px;
  background: var(--header-bg);
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  box-shadow: 0 4px 20px var(--shadow);
  backdrop-filter: blur(10px);
}

.header-text {
  font-size:26px;
  font-weight:800;
  color: var(--header-text);
}

/* Контент */
.main-container {
  width:100%;
  max-width:500px;
  padding:20px;
  margin-top:20px;
  box-sizing: border-box;
}

.box {
  background: var(--card-bg);
  padding:30px 25px;
  border-radius:25px;
  box-shadow: 0 15px 35px var(--shadow);
  margin-bottom: 20px;
  text-align:center;
}

.box h2 { margin:0 0 10px; font-size:22px; font-weight:800; }
.box p { margin:0 0 20px; color:var(--text-gray); }

/* Кнопки */
button {
  width:100%;
  padding:16px;
  font-size:16px;
  font-weight:600;
  margin-bottom:12px;
  border:none;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  cursor:pointer;
  transition: 0.2s;
}

button:active { transform:scale(0.96); }

.whatsapp { background: var(--primary); color:white; }
.catalog { background: var(--text-main); color: var(--card-bg); }
.rules { background: transparent; border:2px solid var(--text-main); color: var(--text-main); opacity:0.8; }

/* Соцсети */
.social-box {
  background: var(--card-bg);
  padding:25px;
  border-radius:25px;
  box-shadow: 0 10px 30px var(--shadow);
  text-align:center;
}

.icon-wrapper {
  display:flex;
  justify-content:center;
  gap:25px;
  margin-top:15px;
}

.icon-wrapper img { width:48px; border-radius: 12px; }

footer {
  padding:30px;
  text-align:center;
  font-size:13px;
  color:var(--text-gray);
}
</style>
</head>
<body>

<script>
  (function() {
    const savedTheme = localStorage.getItem('pavlodar-theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>
