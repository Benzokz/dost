<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pavlodar24 | Главная</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00c853;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1e272e;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        /* Цвета для темной темы */
        [data-theme="dark"] {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        /* Стили кнопки переключения (пример) */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px;
            background: var(--card-bg);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px var(--shadow);
            border: none;
            font-size: 20px;
            z-index: 1001;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, #00c853, #00e676);
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .main-btn {
            display: block;
            max-width: 400px;
            margin: 20px auto;
            padding: 25px;
            background: var(--card-bg);
            color: var(--text-main);
            text-decoration: none;
            border-radius: 28px;
            font-weight: 800;
            font-size: 20px;
            text-align: center;
            box-shadow: 0 10px 25px var(--shadow);
        }
    </style>
</head>
<body>

<script>
    (function() {
        const savedTheme = localStorage.getItem('pavlodar-theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
</script>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌓</button>

<header>
    <h1>Pavlodar24 🚀</h1>
    <p>Доставка и услуги в вашем городе</p>
</header>

<div style="padding: 20px;">
    <a href="catalog/index.html" class="main-btn">📦 Перейти в каталог</a>
    <a href="cart.html" class="main-btn" style="background: var(--primary); color: white;">🛒 Моя корзина</a>
</div>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        let currentTheme = html.getAttribute('data-theme');
        let newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        // Применяем тему
        html.setAttribute('data-theme', newTheme);
        
        // СОХРАНЯЕМ В ПАМЯТЬ ДЛЯ ВСЕХ СТРАНИЦ
        localStorage.setItem('pavlodar-theme', newTheme);
        
        console.log("Тема изменена на: " + newTheme);
    }
</script>

</body>
</html>
