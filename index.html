<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavlodar24 | Доставка</title>
<style>
:root {
  --primary: #00c853;
  --bg: #f0f2f5;
  --card-bg: #fff;
  --text-main: #1e272e;
  --text-gray: #7f8c8d;
  --shadow: rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg: #121212;
  --card-bg: #1e1e1e;
  --text-main: #fff;
  --text-gray: #a0a0a0;
  --shadow: rgba(0,0,0,0.4);
}

body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text-main);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

/* Кнопка темы */
.theme-toggle {
  position: fixed;
  top:15px;
  right:15px;
  width:45px;
  height:45px;
  border-radius:50%;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:1000;
  font-size:20px;
}

/* Хедер */
<header>
  <div class="batman-light">
    <svg viewBox="0 0 200 100" class="bat-mask">
      <defs>
        <radialGradient id="batLight" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="yellow" stop-opacity="0.8" />
          <stop offset="100%" stop-color="yellow" stop-opacity="0" />
        </radialGradient>
        <mask id="batMask">
          <rect width="100%" height="100%" fill="white"/>
          <!-- Силуэт летучей мыши -->
          <path fill="black" d="M100,20 
             C90,10 70,10 60,20 
             C50,10 30,10 20,20 
             C20,40 50,60 100,20 
             C150,60 180,40 180,20 
             C170,10 150,10 140,20 
             C130,10 110,10 100,20 Z"/>
        </mask>
      </defs>
      <rect width="100%" height="100%" fill="url(#batLight)" mask="url(#batMask)"/>
    </svg>
    <span class="header-text">Доставка 24/7 Павлодар</span>
  </div>
</header>

<div class="main-container">
  <div class="box">
    <h2>Заказывай доставку за 2 минуты</h2>
    <p>Продукты • Еда • Напитки • Аптека</p>

    <button class="whatsapp" onclick="window.open('https://wa.me/77716093547','_blank')">Написать в WhatsApp</button>
    <button class="catalog" onclick="location.href='catalog/index.html'">Открыть каталог</button>
    <button class="rules" onclick="location.href='rules/index.html'">Правила сервиса</button>
  </div>

  <div class="social-box">
    <h3>Мы онлайн 24/7</h3>
    <div class="icon-wrapper">
      <a href="https://instagram.com/dostavka.pavlodar" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
      </a>
      <a href="https://wa.me/77716093547" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
      </a>
    </div>
  </div>
</div>

<footer>© 2026 DOSTAVKA PAVLODAR24 🚀</footer>

<script>
function toggleTheme(){
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');
  if(html.getAttribute('data-theme')==='dark'){
    html.removeAttribute('data-theme');
    icon.textContent='🌙';
  } else {
    html.setAttribute('data-theme','dark');
    icon.textContent='☀️';
  }
}
</script>
</body>
</html>
