<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Доставка 24/7 Павлодар</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* БАЗОВЫЕ ПЕРЕМЕННЫЕ */
        :root {
            --primary: #00c853;
            --primary-grad: linear-gradient(135deg, #00c853, #00e676);
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1e272e;
            --text-gray: #7f8c8d;
            --shadow: rgba(0, 0, 0, 0.08);
            --blur-bg: rgba(255, 255, 255, 0.7);
        }

        /* ПЕРЕМЕННЫЕ ТЕМНОЙ ТЕМЫ */
        [data-theme="dark"] {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-gray: #a0a0a0;
            --shadow: rgba(0, 0, 0, 0.5);
            --blur-bg: rgba(26, 26, 26, 0.8);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            transition: background 0.4s ease, color 0.4s ease, transform 0.2s ease;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ПРЕЛЛОАДЕР (ВАУ-ЭФФЕКТ) */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-grad);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        .loader-content { color: white; text-align: center; }
        .loader-rocket { font-size: 50px; animation: pulse 1.5s infinite; display: block; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* КНОПКА ТЕМЫ */
        .theme-switch {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: var(--blur-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 15px var(--shadow);
        }

        header {
            width: 100%; max-width: 500px; padding: 70px 20px;
            text-align: center; background: var(--primary-grad); color: white;
            font-size: 32px; font-weight: 800; border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px; box-shadow: 0 10px 30px rgba(0, 200, 83, 0.3);
            letter-spacing: -1px;
        }

        .main-container { width: 100%; max-width: 500px; padding: 20px; margin-top: -45px; }

        .card {
            background: var(--card-bg); padding: 35px 25px; border-radius: 35px;
            box-shadow: 0 20px 45px var(--shadow);
            opacity: 0; transform: translateY(30px);
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        h2 { font-weight: 800; font-size: 24px; margin: 0 0 10px 0; }
        p { color: var(--text-gray); margin-bottom: 30px; line-height: 1.5; }

        /* КНОПКИ */
        button {
            width: 100%; padding: 20px; font-size: 17px; font-weight: 700;
            margin-bottom: 15px; border: none; border-radius: 22px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .btn-wa { background: var(--primary-grad); color: white; box-shadow: 0 10px 20px rgba(0, 200, 83, 0.2); }
        .btn-cat { background: var(--text-main); color: var(--card-bg); }
        .btn-rules { background: transparent; border: 2px solid var(--text-main); color: var(--text-main); opacity: 0.7; }

        button:active { transform: scale(0.96); }

        /* СОЦСЕТИ */
        .social-box {
            margin-top: 25px; background: var(--card-bg); padding: 25px;
            border-radius: 35px; box-shadow: 0 10px 30px var(--shadow);
            text-align: center; opacity: 0; transform: translateY(30px);
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s forwards;
        }

        .icons { display: flex; justify-content: center; gap: 35px; margin-top: 15px; }      background: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Кнопка темы */
    .theme-toggle {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      width: 45px; height: 45px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    header {
      width: 100%; max-width: 500px; padding: 50px 20px;
      text-align: center; background: var(--primary); color: white;
      font-size: 28px; font-weight: 800; border-bottom-left-radius: 40px;
      border-bottom-right-radius: 40px; box-shadow: 0 10px 30px rgba(0, 200, 83, 0.2);
    }

    .main-container { width: 100%; max-width: 500px; padding: 20px; }

    .box {
      background: var(--card-bg); padding: 30px 25px; border-radius: var(--card-radius);
      box-shadow: 0 15px 35px var(--shadow); margin-top: -35px;
      opacity: 0; transform: translateY(20px);
      animation: fadeInUp 0.8s ease forwards;
    }

    h2 { font-weight: 800; font-size: 22px; margin: 0 0 10px 0; }
    p { color: var(--text-secondary); margin-bottom: 25px; }

    button {
      width: 100%; padding: 18px; font-size: 16px; font-weight: 600;
      margin-bottom: 12px; border: none; border-radius: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .whatsapp { background: var(--primary); color: white; }
    .catalog { background: var(--text-main); color: var(--card-bg); }
    .rules { background: var(--btn-rules); color: var(--text-secondary); }

    button:active { transform: scale(0.96); }

    .social-box {
      background: var(--card-bg); margin-top: 20px; padding: 25px;
      border-radius: var(--card-radius); box-shadow: 0 10px 30px var(--shadow);
      opacity: 0; transform: translateY(20px);
      animation: fadeInUp 0.8s ease 0.2s forwards;
    }

    .icon-wrapper { display: flex; justify-content: center; gap: 25px; margin-top: 20px; }
    .icon-wrapper img { width: 48px; }

    footer { padding: 30px; font-size: 13px; color: var(--text-secondary); text-align: center; }

    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    .rocket { display: inline-block; animation: rocketMove 2s infinite ease-in-out; }
    @keyframes rocketMove { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  </style>
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">
  <span id="theme-icon">🌙</span>
</button>

<header>
  Pavlodar24 <span class="rocket">🚀</span>
</header>

<div class="main-container">
  <div class="box">
    <h2>Заказывай доставку за 2 минуты</h2>
    <p>Продукты • Еда • Напитки • Аптека</p>

    <button class="whatsapp" onclick="window.open('https://wa.me/77716093547','_blank')">
      Написать в WhatsApp
    </button>

    <button class="catalog" onclick="location.href='catalog/index.html'">
      Открыть каталог
    </button>

    <button class="rules" onclick="location.href='rules/index.html'">
      Правила сервиса
    </button>
  </div>

  <div class="social-box">
    <h3 style="margin:0; text-align:center;">Мы онлайн 24/7</h3>
    <div class="icon-wrapper">
      <a href="https://instagram.com/dostavka.pavlodar" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
      </a>
      <a href="https://wa.me/77716093547" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
      </a>
    </div>
  </div>
</div>

<footer>
  © 2026 DOSTAVKA PAVLODAR24 🚀
</footer>
