<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Корзина | Pavlodar24</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00c853;
            --primary-grad: linear-gradient(135deg, #00c853, #00e676);
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1e272e;
            --text-gray: #7f8c8d;
            --shadow: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-gray: #a0a0a0;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header {
            width: 100%; max-width: 500px; padding: 40px 20px;
            background: var(--primary-grad); color: white; text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 200, 83, 0.2);
        }

        .container { width: 100%; max-width: 500px; padding: 20px; flex-grow: 1; }

        /* КАРТОЧКА ТОВАРА В КОРЗИНЕ */
        .cart-item {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px var(--shadow);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-info h3 { margin: 0; font-size: 18px; font-weight: 800; }
        .item-info p { margin: 5px 0 0 0; color: var(--primary); font-weight: 700; }

        .btn-remove {
            background: #ffeded; color: #ff5252; border: none;
            width: 40px; height: 40px; border-radius: 15px;
            font-size: 20px; cursor: pointer; font-weight: 800;
        }

        /* ПУСТАЯ КОРЗИНА */
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state h1 { font-size: 60px; margin: 0; }

        /* ФИКСИРОВАННЫЙ ПОДВАЛ */
        .footer-order {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: var(--card-bg); padding: 25px;
            border-top-left-radius: 35px; border-top-right-radius: 35px;
            box-shadow: 0 -10px 40px var(--shadow);
            z-index: 100;
        }

        .total-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .total-box span { font-size: 16px; color: var(--text-gray); font-weight: 600; }
        .total-box b { font-size: 24px; font-weight: 800; color: var(--text-main); }

        .btn-confirm {
            width: 100%; padding: 22px; border-radius: 22px; border: none;
            background: var(--primary-grad); color: white;
            font-size: 18px; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 200, 83, 0.3);
        }

        .btn-confirm:active { transform: scale(0.96); }

        .back-btn { color: white; text-decoration: none; font-weight: 600; opacity: 0.8; font-size: 14px; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">Корзина 🛒</h1>
    <a href="javascript:history.back()" class="back-btn">← Вернуться назад</a>
</header>

<div class="container" id="cart-content">
    </div>

<div class="footer-order" id="order-panel" style="display: none;">
    <div class="total-box">
        <span>К оплате:</span>
        <b id="final-price">0 ₸</b>
    </div>
    <button class="btn-confirm" onclick="sendToWhatsApp()">Оформить заказ в WhatsApp</button>
</div>

<script>
    // Загружаем товары из памяти
    let cart = JSON.parse(localStorage.getItem('pvl_cart')) || [];

    function displayItems() {
        const container = document.getElementById('cart-content');
        const panel = document.getElementById('order-panel');
        const finalPrice = document.getElementById('final-price');

        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <h1>🧺</h1>
                    <h2>Ваша корзина пуста</h2>
                    <p style="color:gray">Добавьте товары из каталога,<br>чтобы сделать заказ.</p>
                </div>`;
            panel.style.display = 'none';
            return;
        }

        panel.style.display = 'block';
        container.innerHTML = '';
        let total = 0;

        cart.forEach((item, index) => {
            total += item.price;
            container.innerHTML += `
                <div class="cart-item">
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p>${item.price} ₸</p>
                    </div>
                    <button class="btn-remove" onclick="deleteItem(${index})">×</button>
                </div>
            `;
        });

        finalPrice.innerText = total + ' ₸';
    }

    function deleteItem(index) {
        cart.splice(index, 1); // Удаляем
        localStorage.setItem('pvl_cart', JSON.stringify(cart)); // Сохраняем
        displayItems(); // Обновляем экран
    }

    function sendToWhatsApp() {
        const phone = "77716093547";
        let text = "🚀 *НОВЫЙ ЗАКАЗ (Pavlodar24)*\n\n";
        
        let sum = 0;
        cart.forEach((item, i) => {
            text += `${i + 1}. *${item.name}* — ${item.price} ₸\n`;
            sum += item.price;
        });

        text += `\n💰 *ИТОГО: ${sum} ₸*\n\n📍 Жду подтверждения!`;
        
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        
        // По желанию: очистить корзину после нажатия кнопки
        // localStorage.removeItem('pvl_cart');
    }

    // Темная тема
    if (localStorage.getItem('pavlodar-theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }

    // Запуск при открытии
    window.onload = displayItems;
</script>

</body>
</html>
