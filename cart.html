<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Корзина | Pavlodar24</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00c853;
            --primary-grad: linear-gradient(135deg, #00c853, #00e676);
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1e272e;
            --text-gray: #7f8c8d;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-gray: #a0a0a0;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding-bottom: 120px;
        }

        header {
            width: 100%; max-width: 500px; padding: 40px 20px;
            background: var(--primary-grad); color: white; text-align: center;
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px;
        }

        .container { width: 100%; max-width: 500px; padding: 20px; }

        /* СПИСОК ТОВАРОВ */
        .cart-item {
            background: var(--card-bg); border-radius: 20px; padding: 15px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px; box-shadow: 0 8px 20px var(--shadow);
        }

        .item-info { flex-grow: 1; }
        .item-name { font-weight: 700; font-size: 16px; margin: 0; }
        .item-price { color: var(--primary); font-weight: 800; font-size: 14px; margin: 4px 0 0 0; }

        .remove-btn {
            background: #ff525215; color: #ff5252; border: none;
            width: 35px; height: 35px; border-radius: 12px;
            font-size: 18px; cursor: pointer; font-weight: bold;
        }

        /* ПУСТАЯ КОРЗИНА */
        #empty-msg { text-align: center; padding: 50px 20px; color: var(--text-gray); }

        /* ПАНЕЛЬ ИТОГО */
        .bottom-panel {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: var(--card-bg); padding: 25px;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            box-shadow: 0 -10px 30px var(--shadow);
            z-index: 100;
        }

        .total-row { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 20px; font-weight: 800; }

        .btn-order {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: var(--primary-grad); color: white;
            font-size: 18px; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 200, 83, 0.3);
        }

        .btn-order:active { transform: scale(0.96); }

        .back-link { color: white; text-decoration: none; font-size: 14px; margin-top: 10px; display: inline-block; opacity: 0.8; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">Мой заказ 🛒</h1>
    <a href="catalog/index.html" class="back-link">← Вернуться в каталог</a>
</header>

<div class="container" id="cart-list">
    </div>

<div id="empty-msg" style="display:none;">
    <h2 style="font-size: 40px;">🧺</h2>
    <h3>Корзина пуста</h3>
    <p>Добавьте что-нибудь из каталога</p>
</div>

<div class="bottom-panel" id="bottom-panel">
    <div class="total-row">
        <span>Итого:</span>
        <span id="total-sum">0 ₸</span>
    </div>
    <button class="btn-order" onclick="sendOrder()">Заказать через WhatsApp</button>
</div>

<script>
    // 1. Загрузка корзины
    let cart = JSON.parse(localStorage.getItem('pvl_cart')) || [];

    function renderCart() {
        const list = document.getElementById('cart-list');
        const emptyMsg = document.getElementById('empty-msg');
        const panel = document.getElementById('bottom-panel');
        const totalSum = document.getElementById('total-sum');

        list.innerHTML = '';
        
        if (cart.length === 0) {
            emptyMsg.style.display = 'block';
            panel.style.display = 'none';
            return;
        }

        emptyMsg.style.display = 'none';
        panel.style.display = 'block';

        let sum = 0;
        cart.forEach((item, index) => {
            sum += item.price;
            list.innerHTML += `
                <div class="cart-item">
                    <div class="item-info">
                        <p class="item-name">${item.name}</p>
                        <p class="item-price">${item.price} ₸</p>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})">×</button>
                </div>
            `;
        });

        totalSum.innerText = sum + ' ₸';
    }

    // 2. Удаление товара
    function removeItem(index) {
        if (navigator.vibrate) navigator.vibrate(20);
        cart.splice(index, 1);
        localStorage.setItem('pvl_cart', JSON.stringify(cart));
        renderCart();
    }

    // 3. Отправка в WhatsApp
    function sendOrder() {
        const phone = "77716093547";
        let message = "🚀 *Новый заказ в Pavlodar24*\n\n";
        
        let sum = 0;
        cart.forEach((item, i) => {
            message += `${i+1}. ${item.name} — ${item.price} ₸\n`;
            sum += item.price;
        });

        message += `\n💰 *Итого: ${sum} ₸*\n\n📍 Жду звонка для уточнения адреса!`;
        
        const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
        
        // Очищаем корзину после заказа (по желанию)
        // localStorage.removeItem('pvl_cart');
    }

    // Тема
    if (localStorage.getItem('pavlodar-theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }

    window.onload = renderCart;
</script>

</body>
</html>
