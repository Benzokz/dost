<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Каталог товаров</title>
    <style>
        :root {
            --primary: #00c853;
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #333;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f5f5, #e8f5e9);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== HEADER ===== */
        .topbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .topbar a { text-decoration: none; color: var(--primary); font-weight: bold; }

        .count {
            background: var(--primary);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        /* ===== CONTAINER ===== */
        .container {
            padding: 15px;
            padding-bottom: 100px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card h3 { margin: 0 0 5px 0; font-size: 1.2rem; }
        .card p { margin: 0 0 15px 0; color: #777; font-size: 0.95rem; }

        .addBtn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 15px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* ===== CART SYSTEM ===== */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 1500;
            backdrop-filter: blur(2px);
        }
        .overlay.active { display: block; }

        .cartBar {
            position: fixed;
            bottom: -100%;
            left: 0; right: 0;
            background: white;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            border-radius: 25px 25px 0 0;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            /* Ограничиваем высоту, чтобы не закрывало всё */
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .cartBar.active { bottom: 0; }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .close-cart {
            background: #eee;
            border: none;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: bold;
            color: #666;
        }

        .cartItems {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 15px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .item-info b { display: block; font-size: 15px; }
        .item-info span { font-size: 13px; color: var(--primary); font-weight: bold; }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .controls button {
            width: 35px; height: 35px;
            border: none; border-radius: 10px;
            background: #f0f0f0; font-size: 18px;
            font-weight: bold; cursor: pointer;
        }

        .total {
            font-size: 1.3rem;
            font-weight: 800;
            text-align: right;
            margin: 10px 0;
            padding-top: 10px;
            border-top: 2px solid #f9f9f9;
        }

        .orderBtn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border: none;
            border-radius: 18px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3);
        }

        /* Чтобы кнопка заказа не "прилипала" к низу на iPhone */
        @supports (padding: max(0px)) {
            .cartBar { padding-bottom: max(20px, env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>

<div class="topbar">
    <a href="../index.html">← Меню</a>
    <div style="font-weight: 800; letter-spacing: 1px;">КАТАЛОГ</div>
    <div class="count" id="count" onclick="toggleCart(true)" style="cursor:pointer">0</div>
</div>

<div class="container" id="product-list">
    </div>

<div class="overlay" id="overlay" onclick="toggleCart(false)"></div>

<div class="cartBar" id="cartBar">
    <div class="cart-header">
        <span style="font-weight: 900; color: #888;">ВАШ ЗАКАЗ</span>
        <button class="close-cart" onclick="toggleCart(false)">Свернуть</button>
    </div>
    
    <div class="cartItems" id="cart"></div>
    
    <div class="total" id="total">Итого: 0 тг</div>
    <button class="orderBtn" onclick="sendOrder()">Заказать в WhatsApp</button>
</div>

<script>
    // Список товаров
    const products = [
        { id: 1, name: "Пиво «Немецкое»", price: 2000, desc: "Свежее, 2 литра" },
        { id: 2, name: "Донер с Фудбазы", price: 1500, desc: "Сочный, с говядиной" },
        { id: 3, name: "Хот-дог со Сьешки", price: 1200, desc: "Классический" },
        { id: 4, name: "Maxi Чай 2л", price: 1000, desc: "Ледяной лимон" },
        { id: 5, name: "Winston Caster", price: 1800, desc: "В наличии" }
    ];

    let cart = {};

    // Отрисовка витрины
    function init() {
        const list = document.getElementById('product-list');
        list.innerHTML = products.map((p, i) => `
            <div class="card" style="animation-delay: ${i * 0.1}s">
                <h3>${p.name}</h3>
                <p>${p.desc} — <b>${p.price} тг</b></p>
                <button class="addBtn" onclick="addToCart(${p.id})">Добавить</button>
            </div>
        `).join('');
    }

    // Управление корзиной
    function toggleCart(show) {
        document.getElementById("cartBar").classList.toggle("active", show);
        document.getElementById("overlay").classList.toggle("active", show);
    }

    function addToCart(id) {
        if (navigator.vibrate) navigator.vibrate(40);
        const p = products.find(x => x.id === id);
        if (cart[id]) cart[id].q++;
        else cart[id] = { name: p.name, price: p.price, q: 1 };
        
        renderCart();
        toggleCart(true); // Показываем при добавлении
    }

    function changeQty(id, delta) {
        cart[id].q += delta;
        if (cart[id].q <= 0) delete cart[id];
        renderCart();
    }

    function renderCart() {
        const cartContainer = document.getElementById("cart");
        let html = "";
        let sum = 0;
        let count = 0;

        const items = Object.entries(cart);

        if (items.length === 0) {
            cartContainer.innerHTML = "<div style='text-align:center; padding:20px; color:#ccc;'>Корзина пуста 🛒</div>";
            document.getElementById("total").innerText = "Итого: 0 тг";
            document.getElementById("count").innerText = 0;
            toggleCart(false);
            return;
        }

        items.forEach(([id, item]) => {
            sum += item.price * item.q;
            count += item.q;
            html += `
                <div class="item">
                    <div class="item-info">
                        <b>${item.name}</b>
                        <span>${item.price * item.q} тг</span>
                    </div>
                    <div class="controls">
                        <button onclick="changeQty(${id}, -1)">−</button>
                        <span>${item.q}</span>
                        <button onclick="changeQty(${id}, 1)">+</button>
                    </div>
                </div>`;
        });

        cartContainer.innerHTML = html;
        document.getElementById("total").innerText = `Итого: ${sum} тг`;
        document.getElementById("count").innerText = count;
    }

    function sendOrder() {
        let msg = "🚀 *Новый заказ:*\n\n";
        let total = 0;
        for (let id in cart) {
            msg += `• ${cart[id].name} [${cart[id].q} шт] — ${cart[id].price * cart[id].q} тг\n`;
            total += cart[id].price * cart[id].q;
        }
        msg += `\n💰 *Итого к оплате: ${total} тг*`;
        window.open(`https://wa.me/77716093547?text=${encodeURIComponent(msg)}`, "_blank");
    }

    init();
</script>

</body>
</html>
