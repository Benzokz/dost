<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Каталог товаров</title>
    <style>
        :root {
            --primary: #00c853;
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #333;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f5f5, #e8f5e9);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== HEADER ===== */
        .topbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .topbar a { text-decoration: none; color: var(--primary); font-weight: bold; }

        .count {
            background: var(--primary);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        /* ===== CONTAINER ===== */
        .container {
            padding: 15px;
            padding-bottom: 200px; /* Запас под корзину */
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card h3 { margin: 0 0 5px 0; font-size: 1.2rem; }
        .card p { margin: 0 0 15px 0; color: #777; font-size: 0.95rem; }

        .addBtn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 15px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .addBtn:active { transform: scale(0.96); opacity: 0.9; }

        /* ===== CART BAR ===== */
        .cartBar {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: white;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            border-radius: 25px 25px 0 0;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
        }

        .cartBar.active { bottom: 0; }

        .cartItems {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .item-info b { display: block; font-size: 14px; }
        .item-info span { font-size: 12px; color: #888; }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .controls button {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 10px;
            background: #f0f0f0;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .total {
            font-size: 1.2rem;
            font-weight: 800;
            text-align: right;
            margin: 10px 0;
        }

        .orderBtn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border: none;
            border-radius: 18px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3);
        }

        /* Кастомный скроллбар */
        .cartItems::-webkit-scrollbar { width: 4px; }
        .cartItems::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
    </style>
</head>
<body>

<div class="topbar">
    <a href="../index.html">← Меню</a>
    <div style="font-weight: 800;">КАТАЛОГ</div>
    <div class="count" id="count">0</div>
</div>

<div class="container" id="product-list">
    </div>

<div class="cartBar" id="cartBar">
    <div style="text-align:center; color:#ccc; margin-bottom:10px;">—— Ваша корзина ——</div>
    <div class="cartItems" id="cart"></div>
    <div class="total" id="total">Итого: 0 тг</div>
    <button class="orderBtn" onclick="sendOrder()">Заказать в WhatsApp</button>
</div>

<script>
    // 1. База товаров (удобно добавлять новые здесь)
    const products = [
        { id: 1, name: "Пиво «Немецкое»", price: 2000, desc: "Свежее, 2 литра" },
        { id: 2, name: "Донер с Фудбазы", price: 1500, desc: "Сочный, с говядиной" },
        { id: 3, name: "Хот-дог со Сьешки", price: 1200, desc: "Классический" },
        { id: 4, name: "Maxi Чай 2л", price: 1000, desc: "Ледяной лимон" },
        { id: 5, name: "Winston Caster", price: 1800, desc: "В наличии" }
    ];

    let cart = {};

    // 2. Генерация карточек товаров
    function initProducts() {
        const container = document.getElementById('product-list');
        container.innerHTML = products.map((p, index) => `
            <div class="card" style="animation-delay: ${index * 0.1}s">
                <h3>${p.name}</h3>
                <p>${p.desc} — <b>${p.price} тг</b></p>
                <button class="addBtn" onclick="addToCart(${p.id})">Добавить</button>
            </div>
        `).join('');
    }

    // 3. Логика корзины
    function addToCart(id) {
        if (navigator.vibrate) navigator.vibrate(40);
        
        const product = products.find(p => p.id === id);
        if (cart[id]) {
            cart[id].q++;
        } else {
            cart[id] = { name: product.name, price: product.price, q: 1 };
        }
        renderCart();
    }

    function changeQty(id, delta) {
        cart[id].q += delta;
        if (cart[id].q <= 0) delete cart[id];
        renderCart();
    }

    function renderCart() {
        const cartDiv = document.getElementById("cart");
        let html = "";
        let totalSum = 0;
        let totalCount = 0;

        const items = Object.entries(cart);

        if (items.length === 0) {
            document.getElementById("cartBar").classList.remove("active");
            document.getElementById("count").innerText = 0;
            return;
        }

        items.forEach(([id, item]) => {
            const sum = item.price * item.q;
            totalSum += sum;
            totalCount += item.q;

            html += `
                <div class="item">
                    <div class="item-info">
                        <b>${item.name}</b>
                        <span>${item.price} тг за шт.</span>
                    </div>
                    <div class="controls">
                        <button onclick="changeQty(${id}, -1)">−</button>
                        <span>${item.q}</span>
                        <button onclick="changeQty(${id}, 1)">+</button>
                    </div>
                </div>`;
        });

        cartDiv.innerHTML = html;
        document.getElementById("total").innerText = `Итого: ${totalSum} тг`;
        document.getElementById("count").innerText = totalCount;
        document.getElementById("cartBar").classList.add("active");
        
        // Анимация прыжка счетчика
        const counter = document.getElementById("count");
        counter.style.transform = "scale(1.3)";
        setTimeout(() => counter.style.transform = "scale(1)", 200);
    }

    // 4. Отправка заказа
    function sendOrder() {
        let msg = "🚀 *Новый заказ:*\n\n";
        let sum = 0;

        for (let id in cart) {
            const item = cart[id];
            msg += `• ${item.name} (${item.q} шт) — ${item.price * item.q} тг\n`;
            sum += item.price * item.q;
        }

        msg += `\n💰 *Итого: ${sum} тг*`;
        
        const phone = "77716093547";
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
    }

    // Запуск
    initProducts();
</script>

</body>
</html>
