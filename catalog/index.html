<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Каталог | Pavlodar24</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00c853;
            --primary-grad: linear-gradient(135deg, #00c853, #00e676);
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1e272e;
            --text-gray: #7f8c8d;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-gray: #a0a0a0;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: 0.3s; }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header {
            width: 100%; max-width: 500px; padding: 50px 20px;
            background: var(--primary-grad); color: white; text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 200, 83, 0.2);
        }

        .container { width: 100%; max-width: 500px; padding: 20px; margin-top: -30px; }

        .category-card {
            background: var(--card-bg);
            margin-bottom: 15px;
            padding: 25px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 10px 25px var(--shadow);
            font-weight: 800;
            font-size: 18px;
        }

        .category-card:active { transform: scale(0.96); }

        .icon-circle {
            width: 45px; height: 45px; background: var(--bg);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .back-btn {
            margin-top: 15px; color: white; text-decoration: none; 
            font-weight: 600; display: inline-block; opacity: 0.9;
            font-size: 14px;
        }

        #cart-panel {
            position: fixed; bottom: 20px; width: 90%; max-width: 460px;
            background: var(--text-main); color: var(--card-bg);
            padding: 20px; border-radius: 25px; display: none;
            justify-content: space-between; align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); z-index: 1000;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 28px;">Каталог 📦</h1>
    <a href="../index.html" class="back-btn">← На главную</a>
</header>

<div class="container">
    <a href="produkty/index.html" class="category-card">
        <span>Продукты</span>
        <div class="icon-circle">🍎</div>
    </a>

    <a href="gotovayaeda/index.html" class="category-card">
        <span>Готовая еда</span>
        <div class="icon-circle">🍔</div>
    </a>

    <a href="napitky/index.html" class="category-card">
        <span>Напитки</span>
        <div class="icon-circle">🥤</div>
    </a>

    <a href="apteki/index.html" class="category-card">
        <span>Аптека</span>
        <div class="icon-circle">💊</div>
    </a>
</div>

<div id="cart-panel" onclick="location.href='napitki/index.html'">
    <span>🛒 В корзине: <b id="cart-count">0</b> тов.</span>
    <span style="color: var(--primary); font-weight: 800;">Смотреть →</span>
</div>

<script>
    // Проверка темы
    if (localStorage.getItem('pavlodar-theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }

    // Проверка корзины
    function checkCart() {
        const cart = JSON.parse(localStorage.getItem('pvl_cart')) || [];
        const panel = document.getElementById('cart-panel');
        if (cart.length > 0) {
            panel.style.display = 'flex';
            document.getElementById('cart-count').innerText = cart.length;
        }
    }
    window.onload = checkCart;
</script>
    <div id="cart-panel" class="cart-floating-panel" onclick="location.href='../cart.html'">
    <div style="display: flex; flex-direction: column;">
        <span style="font-size: 11px; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px;">Ваш заказ:</span>
        <span style="font-size: 17px;">🛒 <b id="cart-count">0</b> товаров</span>
    </div>
    <span class="edit-btn">Изменить →</span>
</div>

<style>
  .cart-floating-panel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 440px;
    background: #1e272e; /* Темный стильный цвет */
    color: white;
    padding: 15px 20px;
    border-radius: 22px;
    display: none; /* Скрыто по умолчанию, пока корзина пуста */
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    z-index: 1000;
    cursor: pointer;
    transition: 0.3s;
  }

  .cart-floating-panel:active { transform: translateX(-50%) scale(0.95); }

  .edit-btn {
    background: var(--primary, #00c853);
    padding: 10px 18px;
    border-radius: 14px;
    font-weight: 800;
    font-size: 14px;
    box-shadow: 0 5px 15px rgba(0, 200, 83, 0.3);
  }
</style>

<script>
function updateCartStatus() {
    // Проверяем, что в памяти
    const cart = JSON.parse(localStorage.getItem('pvl_cart')) || [];
    const panel = document.getElementById('cart-panel');
    const count = document.getElementById('cart-count');
    
    if (cart.length > 0) {
        panel.style.display = 'flex'; // Показываем, если есть товары
        count.innerText = cart.length;
    } else {
        panel.style.display = 'none'; // Скрываем, если пусто
    }
}

// Вызываем функцию при загрузке страницы
window.onload = updateCartStatus;
// И на случай, если пользователь вернулся кнопкой "Назад"
window.onpageshow = updateCartStatus; 
</script>

</body>
</html>
