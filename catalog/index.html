<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Catalog</title>
    <style>
        :root {
            --primary: #00c853;
            --primary-dark: #00a445;
            --accent: #ffab00;
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.8);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            color: #2d3436;
            line-height: 1.5;
        }

        /* ===== ШАПКА ===== */
        .topbar {
            position: sticky;
            top: 0;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .topbar a { 
            text-decoration: none; 
            color: var(--primary); 
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
        }

        .count {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            min-width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 200, 83, 0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ===== СЕТКА ТОВАРОВ ===== */
        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 120px;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.02);
            transform: translateY(30px);
            opacity: 0;
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            transition: transform 0.3s ease;
        }

        .card:active { transform: scale(0.98); }

        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .card h3 { margin: 0 0 8px 0; font-size: 1.25rem; font-weight: 700; color: #1e272e; }
        .card p { margin: 0 0 18px 0; color: #7f8c8d; font-size: 0.95rem; }

        .price-tag {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 15px;
            display: block;
        }

        .addBtn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.2);
            transition: all 0.3s ease;
        }

        .addBtn:active { transform: translateY(2px); box-shadow: none; }

        /* ===== КОРЗИНА (GLASSMorphism) ===== */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 1500;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .cartBar {
            position: fixed;
            bottom: -100%;
            left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.12);
            border-radius: 30px 30px 0 0;
            transition: bottom 0.5s cubic-bezier(0, 0.55, 0.45, 1);
            z-index: 2000;
            max-height: 75vh;
            display: flex;
            flex-direction: column;
        }

        .cartBar.active { bottom: 0; }

        .cart-handle {
            width: 40px; height: 4px; background: #e0e0e0;
            border-radius: 2px; margin: -10px auto 20px;
        }

        .cartItems { overflow-y: auto; flex-grow: 1; }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .controls { display: flex; align-items: center; gap: 15px; }
        .controls button {
            width: 36px; height: 36px; border: none; border-radius: 12px;
            background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            font-size: 18px; font-weight: bold; color: var(--primary);
        }

        .total {
            font-size: 1.4rem; font-weight: 900;
            text-align: right; margin: 20px 0; color: #1e272e;
        }

        .orderBtn {
            width: 100%; padding: 20px; font-size: 18px; border: none;
            border-radius: 22px; background: #1e272e; color: white;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }

        .orderBtn:active { transform: scale(0.97); }

    </style>
</head>
<body>

<div class="topbar">
    <a href="../index.html">← Назад</a>
    <div style="font-weight: 800; font-size: 18px;">Catalog</div>
    <div class="count" id="count">0</div>
</div>

<div class="container" id="product-list"></div>

<div class="overlay" id="overlay" onclick="toggleCart(false)"></div>

<div class="cartBar" id="cartBar">
    <div class="cart-handle" onclick="toggleCart(false)"></div>
    <div class="cartItems" id="cart"></div>
    <div class="total" id="total">0 тг</div>
    <button class="orderBtn" onclick="sendOrder()">Оформить в WhatsApp</button>
</div>
