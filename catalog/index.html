<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Каталог | Pavlodar24</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00c853;
            --primary-grad: linear-gradient(135deg, #00c853, #00e676);
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1e272e;
            --text-gray: #7f8c8d;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-gray: #a0a0a0;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            transition: background 0.3s;
        }

        header {
            width: 100%; max-width: 500px; padding: 50px 20px;
            background: var(--primary-grad); color: white; text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 200, 83, 0.2);
        }

        .container { width: 100%; max-width: 500px; padding: 20px; margin-top: -30px; padding-bottom: 120px; }

        .category-card {
            background: var(--card-bg);
            margin-bottom: 15px;
            padding: 25px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 10px 25px var(--shadow);
            font-weight: 800;
            font-size: 18px;
            transition: 0.2s;
        }

        .category-card:active { transform: scale(0.96); }

        .icon-circle {
            width: 45px; height: 45px; background: var(--bg);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .back-btn {
            margin-top: 15px; color: white; text-decoration: none; 
            font-weight: 600; display: inline-block; opacity: 0.9;
            font-size: 14px;
        }

        /* КОРЗИНА */
        .cart-floating-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 440px;
            background: #1e272e;
            color: white;
            padding: 15px 22px;
            border-radius: 25px;
            display: none; /* Скрыто, пока пусто */
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            z-index: 1000;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .cart-floating-panel:active { transform: translateX(-50%) scale(0.95); }

        .edit-btn {
            background: var(--primary);
            padding: 10px 18px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 28px;">Каталог 📦</h1>
    <a href="../index.html" class="back-btn">← На главную</a>
</header>

<div class="container">
    <a href="produkty/index.html" class="category-card">
        <span>Продукты</span>
        <div class="icon-circle">🍎</div>
    </a>

    <a href="gotovayaeda/index.html" class="category-card">
        <span>Готовая еда</span>
        <div class="icon-circle">🍔</div>
    </a>

    <a href="napitky/index.html" class="category-card">
        <span>Напитки</span>
        <div class="icon-circle">🥤</div>
    </a>

    <a href="apteki/index.html" class="category-card">
        <span>Аптека</span>
        <div class="icon-circle">💊</div>
    </a>
</div>

<div id="cart-panel" class="cart-floating-panel" onclick="goToCart()">
    <div style="display: flex; flex-direction: column;">
        <span style="font-size: 11px; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px;">Ваш заказ:</span>
        <span style="font-size: 17px;">🛒 <b id="cart-count">0</b> товаров</span>
    </div>
    <span class="edit-btn">Изменить →</span>
</div>

<script>
    // 1. Тема
    if (localStorage.getItem('pavlodar-theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }

    // 2. Функция перехода (исправляет 404)
    function goToCart() {
        // Если cart.html лежит в корне сайта, а этот файл в папке catalog/
        window.location.href = '../cart.html';
    }

    // 3. Обновление статуса
    function updateCartStatus() {
        const cart = JSON.parse(localStorage.getItem('pvl_cart')) || [];
        const panel = document.getElementById('cart-panel');
        const count = document.getElementById('cart-count');
        
        if (cart.length > 0) {
            panel.style.display = 'flex';
            count.innerText = cart.length;
        } else {
            panel.style.display = 'none';
        }
    }

    // Запуск при загрузке и при возврате назад
    window.onload = updateCartStatus;
    window.onpageshow = updateCartStatus;
</script>

</body>
</html>
