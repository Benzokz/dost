<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#f5f5f5,#e8f5e9);
}

/* ===== HEADER ===== */
.topbar{
  position:sticky;
  top:0;
  background:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 15px rgba(0,0,0,0.05);
  z-index:1000;
}

.topbar a{
  text-decoration:none;
  color:#00c853;
  font-weight:bold;
}

.count{
  background:#00c853;
  color:#fff;
  padding:5px 10px;
  border-radius:20px;
  font-size:14px;
}

/* ===== CONTAINER ===== */
.container{
  padding:15px;
  padding-bottom:170px;
}

/* ===== CARDS ===== */
.card{
  background:#fff;
  border-radius:20px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 0.6s forwards;
}

.card:nth-child(2){animation-delay:0.1s;}
.card:nth-child(3){animation-delay:0.2s;}
.card:nth-child(4){animation-delay:0.3s;}
.card:nth-child(5){animation-delay:0.4s;}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.card h3{margin:0;}
.card p{margin:6px 0;color:gray;}

.addBtn{
  width:100%;
  margin-top:12px;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:15px;
  background:#00c853;
  color:white;
  transition:0.3s;
  cursor:pointer;
}

.addBtn:hover{
  transform:scale(1.04);
}

.addBtn:active{
  transform:scale(0.95);
}

/* ===== CART ===== */
.cartBar{
  position:fixed;
  bottom:-100%;
  left:0;
  right:0;
  background:white;
  padding:18px;
  box-shadow:0 -5px 25px rgba(0,0,0,0.15);
  border-top-left-radius:25px;
  border-top-right-radius:25px;
  transition:0.4s;
}

.cartBar.active{
  bottom:0;
}

.cartItems{
  max-height:130px;
  overflow-y:auto;
  font-size:14px;
}

.item{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
}

.controls button{
  width:28px;
  height:28px;
  border:none;
  border-radius:8px;
  background:#eee;
  font-size:18px;
  cursor:pointer;
}

.total{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}

.orderBtn{
  width:100%;
  margin-top:14px;
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:18px;
  background:#00c853;
  color:white;
  cursor:pointer;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(0,200,83,0.5);}
  70%{box-shadow:0 0 0 12px rgba(0,200,83,0);}
  100%{box-shadow:0 0 0 0 rgba(0,200,83,0);}
}
</style>
</head>

<body>

<div class="topbar">
  <a href="../index.html">← Главная</a>
  <div>Каталог</div>
  <div class="count" id="count">0</div>
</div>

<div class="container">

<div class="card">
<h3>Пиво “Немецкое”</h3>
<p>2 литра — 2000 тг</p>
<button class="addBtn" onclick="add('Пиво Немецкое 2л',2000)">Добавить</button>
</div>

<div class="card">
<h3>Донер с Фудбазы</h3>
<p>1500 тг</p>
<button class="addBtn" onclick="add('Донер Фудбаза',1500)">Добавить</button>
</div>

<div class="card">
<h3>Хот-дог со Сьешки</h3>
<p>1200 тг</p>
<button class="addBtn" onclick="add('Хот-дог Сьешка',1200)">Добавить</button>
</div>

<div class="card">
<h3>Maxi Чай</h3>
<p>2 литра — 1000 тг</p>
<button class="addBtn" onclick="add('Maxi Чай 2л',1000)">Добавить</button>
</div>

<div class="card">
<h3>Winston Caster</h3>
<p>1800 тг</p>
<button class="addBtn" onclick="add('Winston Caster',1800)">Добавить</button>
</div>

</div>

<div class="cartBar" id="cartBar">
<div class="cartItems" id="cart"></div>
<div class="total" id="total">Итого: 0 тг</div>
<button class="orderBtn" onclick="send()">Заказать в WhatsApp</button>
</div>

<script>
let cart={};

function add(name,price){
  if(navigator.vibrate) navigator.vibrate(40);
  cart[name]?cart[name].q++:cart[name]={p:price,q:1};
  render();
}

function change(name,d){
  cart[name].q+=d;
  if(cart[name].q<=0) delete cart[name];
  render();
}

function render(){
  let html="";
  let sum=0;
  let count=0;

  for(let i in cart){
    sum+=cart[i].p*cart[i].q;
    count+=cart[i].q;

    html+=`
    <div class="item">
      ${i} × ${cart[i].q}
      <div class="controls">
        <button onclick="change('${i}',-1)">−</button>
        <button onclick="change('${i}',1)">+</button>
      </div>
    </div>`;
  }

  document.getElementById("cart").innerHTML=
  html||"Корзина пустая 🛒";

  document.getElementById("total").innerText=
  "Итого: "+sum+" тг";

  document.getElementById("count").innerText=count;

  if(count>0){
    document.getElementById("cartBar").classList.add("active");
  }else{
    document.getElementById("cartBar").classList.remove("active");
  }
}

function send(){
  if(Object.keys(cart).length===0){
    alert("Добавьте товары 😅");
    return;
  }

  let msg="Здравствуйте! Хочу заказать:%0A";
  let sum=0;

  for(let i in cart){
    msg+=`• ${i} × ${cart[i].q}%0A`;
    sum+=cart[i].p*cart[i].q;
  }

  msg+=`%0AИтого: ${sum} тг`;

  window.open("https://wa.me/77716093547?text="+msg,"_blank");
}
</script>

</body>
</html>
